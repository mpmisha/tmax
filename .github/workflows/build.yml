name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    # id-token: write is required by azure/login OIDC. Harmless on non-Windows
    # jobs since they don't call azure/login.
    permissions:
      contents: read
      id-token: write

    # Run Windows tag builds in the "release" environment so the federated
    # credential subject (repo:InbarR/tmax:environment:release) matches and the
    # OIDC exchange succeeds. Other jobs use no environment.
    environment: ${{ (matrix.platform == 'win32' && startsWith(github.ref, 'refs/tags/v')) && 'release' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Azure OIDC login for Windows code signing. Only runs on tagged release
      # builds for win32; PR / branch builds and other platforms skip this and
      # therefore skip signing too.
      - name: Azure login (OIDC for Trusted Signing)
        if: matrix.platform == 'win32' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Install the TrustedSigning PowerShell module used by scripts/windows-sign.cjs.
      - name: Install TrustedSigning PowerShell module
        if: matrix.platform == 'win32' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name TrustedSigning -RequiredVersion 0.5.3 -Scope CurrentUser -Force -AllowClobber
          Get-Module -ListAvailable TrustedSigning | Format-Table Name, Version

      # Linux dependencies for Electron + native modules
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm libx11-dev libxkbfile-dev

      # Generate macOS icon (icns) from png
      - name: Generate macOS icon
        if: matrix.platform == 'darwin'
        run: |
          mkdir -p assets/icon.iconset
          sips -z 16 16     assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Install dependencies
        run: npm install

      - name: Build for ${{ matrix.platform }}-${{ matrix.arch }}
        run: npm run build -- --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign Windows artifacts on tag builds. WINDOWS_SIGN=1 wires the hook
          # in forge.config.ts; the TRUSTED_SIGNING_* vars are read by
          # scripts/windows-sign.cjs and passed to Invoke-TrustedSigning.
          WINDOWS_SIGN: ${{ (matrix.platform == 'win32' && startsWith(github.ref, 'refs/tags/v')) && '1' || '' }}
          TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_PROFILE: ${{ vars.TRUSTED_SIGNING_PROFILE }}

      # Ad-hoc sign macOS app so it can run without Gatekeeper errors
      - name: Ad-hoc sign macOS app
        if: matrix.platform == 'darwin'
        run: |
          codesign --force --deep --sign - out/tmax-darwin-${{ matrix.arch }}/tmax.app

      # Rename Windows Squirrel artifacts to include architecture
      - name: Rename Windows installer and Squirrel artifacts
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SQDIR="out/make/squirrel.windows/${{ matrix.arch }}"

          # Rename Setup.exe to include arch
          for f in "$SQDIR"/*.exe; do
            mv "$f" "$SQDIR/tmax-${VERSION}-${{ matrix.arch }}-Setup.exe"
          done

          # Rename nupkg to include arch (e.g. tmax-1.4.8-x64-full.nupkg)
          for f in "$SQDIR"/*.nupkg; do
            base=$(basename "$f")
            newname=$(echo "$base" | sed "s/-full\.nupkg/-${{ matrix.arch }}-full.nupkg/")
            mv "$f" "$SQDIR/$newname"
          done

          # Rewrite RELEASES file entries to match renamed nupkg, then rename it
          if [ -f "$SQDIR/RELEASES" ]; then
            sed -i "s/-full\.nupkg/-${{ matrix.arch }}-full.nupkg/g" "$SQDIR/RELEASES"
            mv "$SQDIR/RELEASES" "$SQDIR/RELEASES-${{ matrix.arch }}"
          fi

      # Create portable ZIP for Windows
      - name: Create Windows portable ZIP
        if: matrix.platform == 'win32'
        run: |
          cd out
          7z a -tzip tmax-win32-${{ matrix.arch }}-portable.zip tmax-win32-${{ matrix.arch }}

      # Upload only the artifacts we ship: arch-specific Squirrel trio + Windows
      # portable zip + platform installers. Globs are scoped narrowly so a stray
      # un-renamed Setup.exe (or any future MakerZIP zip) can't sneak in.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmax-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            out/make/squirrel.windows/${{ matrix.arch }}/tmax-*-${{ matrix.arch }}-Setup.exe
            out/make/squirrel.windows/${{ matrix.arch }}/tmax-*-${{ matrix.arch }}-full.nupkg
            out/make/squirrel.windows/${{ matrix.arch }}/RELEASES-${{ matrix.arch }}
            out/tmax-win32-${{ matrix.arch }}-portable.zip
            out/make/**/*.dmg
            out/make/**/*.deb
            out/make/**/*.rpm
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      # Rename DMG files to include architecture
      - name: Rename DMG files to include architecture
        run: |
          for dir in artifacts/tmax-darwin-*/; do
            arch=$(basename "$dir" | sed 's/tmax-darwin-//')
            for dmg in "$dir"out/make/**/*.dmg; do
              if [ -f "$dmg" ]; then
                newname=$(dirname "$dmg")/tmax-darwin-${arch}.dmg
                mv "$dmg" "$newname"
              fi
            done
          done

      # Render the curated release body from the template, then append GitHub's
      # auto-generated "What's Changed" PR list. body_path replaces the default
      # auto-notes so we control framing; the appended block keeps the PR log.
      - name: Generate release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          export VERSION="${TAG#v}"
          export BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          envsubst '${VERSION} ${BASE}' < .github/release-body.md.template > release-body.md

          AUTO_NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${TAG}" \
            --jq '.body' 2>/dev/null || true)
          if [ -n "$AUTO_NOTES" ]; then
            printf '\n%s\n' "$AUTO_NOTES" >> release-body.md
          fi

          echo "::group::Rendered release body"
          cat release-body.md
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.nupkg
            artifacts/**/RELEASES*
          draft: false
          # Hyphenated tags (e.g. v1.7.1-rc1, v2.0.0-beta) are flagged as
          # prereleases so they don't surface via /releases/latest and trigger
          # auto-updates for stable users.
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
